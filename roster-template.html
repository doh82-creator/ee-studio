<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Roster 준비표 (교사 참고용)</title>
<style>
  :root{ --ink:#0848A0; --ink-soft:#4C6FA0; --paper:#F2F6FB; --accent:#0078C0; --line:#CBDCEA; }
  *{box-sizing:border-box;}
  body{background:var(--paper); margin:0; padding:40px 20px; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans KR",sans-serif; color:#16233A;}
  .sheet{max-width:640px; margin:0 auto; background:#fff; border:1px solid var(--line); padding:44px 50px;}
  h1{font-family:Georgia,serif; color:var(--ink); font-size:22px; margin:0 0 4px;}
  .sub{font-size:12px; color:var(--accent); font-weight:700; text-transform:uppercase; letter-spacing:1px; margin-bottom:20px;}
  .note{background:#EEF6FB; border-left:3px solid var(--forest,#20B0E8); padding:10px 14px; font-size:12.5px; margin-bottom:22px; line-height:1.6;}
  table{width:100%; border-collapse:collapse; font-size:13px;}
  th{background:var(--ink); color:#fff; padding:8px 10px; text-align:left; font-size:11px; text-transform:uppercase;}
  td{padding:9px 10px; border-bottom:1px solid var(--line);}
  @page{size:A4; margin:14mm;}
</style>
</head>
<body>
<div class="sheet">
  <h1>Roster 준비표</h1>
  <div class="sub">교사 참고용</div>
  <div class="note">
    이 표에 21명의 <strong>학번(StudentID)</strong>과 <strong>이름</strong>을 채운 뒤, Google Sheet의
    <strong>Roster</strong> 탭에 그대로 옮겨 입력하세요 (A열: StudentID, B열: StudentName).
    학번은 숫자 4~6자리(예: 학년+반+번호 조합인 <code>10305</code>)를 권장합니다.
    Roster에 없는 학번은 사이트에서 로그인/등록할 수 없습니다.
  </div>
  <table>
    <tr><th style="width:30%">학번 (StudentID)</th><th style="width:70%">이름 (StudentName)</th></tr>

</div>
</body>
</html>
