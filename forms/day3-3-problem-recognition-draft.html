<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Problem Recognition — Homework</title>
<link rel="stylesheet" href="../assets/form.css">
</head>
<body>
  <div class="site-topbar">
    <div class="brand">EE Research Studio</div>
    <div><a href="../index.html">Home</a> &nbsp;/&nbsp; <a href="../days/day3.html">Day 3</a> &nbsp;/&nbsp; My Problem Recognition</div>
  </div>

  <div class="wrap">
  <div class="sheet">
    <span class="hw-tag">Homework — Due Day 4</span>
    <h1>My Problem Recognition</h1>
    <div class="sub">Day 3 · Problem Recognition</div>

    <div class="lede">
      오늘 찾은 gap · tension · controversy 중 하나를 골라 정리해서 제출하세요. Day 4에서
      이걸 뒷받침할 자료를 함께 찾습니다.
    </div>

    <div class="code-box">
      <label>학번</label>
      <input type="text" id="studentId" placeholder="예: 20301">
      <label>비밀번호(4자리)</label>
      <input type="password" id="studentPin" maxlength="4" placeholder="••••">
      <button id="verifyBtn">확인</button>
      <span id="statusMsg" style="font-size:12.5px;"></span>
    </div>

    <div class="section-title" style="font-size:14px; font-weight:700; color:var(--ink); margin:0 0 10px;">나의 Topic (Day 2)</div>
    <input type="text" id="myTopic" style="width:100%; padding:10px; border:1px solid var(--line-strong); border-radius:5px; font-size:14px;">

    <div class="section-title" style="font-size:14px; font-weight:700; color:var(--ink); margin:20px 0 10px;">유형 (Gap / Tension / Controversy)</div>
    <select id="problemType" style="width:100%; padding:10px; border:1px solid var(--line-strong); border-radius:5px; font-size:14px;">
      <option value="">선택하세요</option>
      <option value="gap">Gap</option>
      <option value="tension">Tension</option>
      <option value="controversy">Controversy</option>
    </select>

    <div class="section-title" style="font-size:14px; font-weight:700; color:var(--ink); margin:20px 0 10px;">문제 인식 서술</div>
    <textarea id="problemStatement" rows="4" style="width:100%; padding:10px; border:1px solid var(--line-strong); border-radius:5px; font-size:14px; font-family:inherit;" placeholder="이 topic에서 발견한 gap/tension/controversy를 구체적으로 서술"></textarea>

    <div class="section-title" style="font-size:14px; font-weight:700; color:var(--ink); margin:20px 0 10px;">왜 지금 다룰 가치가 있는가</div>
    <textarea id="whyNow" rows="3" style="width:100%; padding:10px; border:1px solid var(--line-strong); border-radius:5px; font-size:14px; font-family:inherit;"></textarea>

    <div style="margin-top:24px; display:flex; align-items:center; gap:12px;">
      <button id="saveBtn" style="padding:10px 20px; background:var(--accent); color:#fff; border:none; border-radius:5px; font-weight:700; font-size:14px; cursor:pointer;">저장하기</button>
      <span id="saveStatus" style="font-size:12.5px;"></span>
    </div>
  </div>
  </div>

  <script src="../assets/app.js"></script>
  <script>
    const DAY = 3;
    const FORM_ID = "day3-3-problem-recognition-draft";

    function collectData(){
      return {
        myTopic: document.getElementById("myTopic").value,
        problemType: document.getElementById("problemType").value,
        problemStatement: document.getElementById("problemStatement").value,
        whyNow: document.getElementById("whyNow").value
      };
    }
    function populateData(data){
      if(!data) return;
      document.getElementById("myTopic").value = data.myTopic || "";
      document.getElementById("problemType").value = data.problemType || "";
      document.getElementById("problemStatement").value = data.problemStatement || "";
      document.getElementById("whyNow").value = data.whyNow || "";
    }

    const savedAuth = ee_getSavedAuth();
    if(savedAuth.id) document.getElementById("studentId").value = savedAuth.id;
    if(savedAuth.pin) document.getElementById("studentPin").value = savedAuth.pin;

    async function doVerifyAndLoad(){
      const id = document.getElementById("studentId").value.trim();
      const pin = document.getElementById("studentPin").value.trim();
      if(!id || !pin){ ee_setStatus(document.getElementById("statusMsg"), "학번과 비밀번호를 입력해주세요.", true); return; }
      const result = await ee_verify(id, pin, document.getElementById("statusMsg"));
      if(result.ok){
        const data = await ee_loadResponse(DAY, FORM_ID, document.getElementById("statusMsg"));
        if(data) populateData(data);
      }
    }
    document.getElementById("verifyBtn").addEventListener("click", doVerifyAndLoad);
    if(savedAuth.id && savedAuth.pin) doVerifyAndLoad();

    document.getElementById("saveBtn").addEventListener("click", async ()=>{
      const { id, pin } = ee_getSavedAuth();
      if(!id || !pin){ ee_setStatus(document.getElementById("saveStatus"), "먼저 위에서 학번/비밀번호 확인을 눌러주세요.", true); return; }
      const data = collectData();
      await ee_saveResponse(DAY, FORM_ID, data, document.getElementById("saveStatus"));
    });
  </script>
</body>
</html>
